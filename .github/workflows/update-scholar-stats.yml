name: Update Google Scholar stats

on:
  schedule:
    # Twice a day, on odd minutes: GitHub delays scheduled runs the most at the
    # top of the hour, and a second attempt costs nothing if the first is
    # blocked by Scholar. The script keeps last-known-good values either way.
    - cron: '23 3 * * *'
    - cron: '47 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-scholar-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch profile metrics and per-article citations 📊
        id: fetch
        # Deliberately NOT continue-on-error: a blocked fetch leaves the data
        # files untouched, which is indistinguishable from "nothing changed".
        # Letting the job go red is the only signal that the data has gone stale.
        env:
          # Mirrors scholar_userid in _config.yml
          SCHOLAR_USERID: CF7dea8AAAAJ
          # Optional. Set this repository secret to fall back to SerpAPI when
          # Google Scholar blocks the runner's datacenter IP.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python3 scripts/fetch_scholar_stats.py

      - name: Commit if changed 💾
        id: commit
        run: |
          if [[ -n "$(git status --porcelain _data/scholar_stats.yml _data/citations.yml)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/scholar_stats.yml _data/citations.yml
            git commit -m "chore: update Google Scholar stats"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No change in Scholar stats."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site deploy 🚀
        # Pushes made with GITHUB_TOKEN do not trigger other workflows, so kick
        # off the deploy explicitly when the stats actually changed.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref ${{ github.ref_name }}